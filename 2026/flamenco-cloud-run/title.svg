  <path d="M580 320 C550 285 542 250 562 215 C558 240 572 248 572 228 C578 252 600 240 594 204 C620 228 630 278 580 320Z" fill="#ff6b35"/>
  <path d="M580 313 C556 283 552 258 568 232 C566 252 578 258 578 240 C580 260 598 252 596 224 C618 246 622 292 580 313Z" fill="#ffa500"/>
